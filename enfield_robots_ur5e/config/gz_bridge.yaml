# ros_gz_bridge Topic Mappings — UR5e Simulation
# Bridges Gazebo Ignition topics to ROS2 for watchdog consumption.

- ros_topic_name: /clock
  gz_topic_name: /clock
  ros_type_name: rosgraph_msgs/msg/Clock
  gz_type_name: ignition.msgs.Clock
  direction: GZ_TO_ROS

- ros_topic_name: /joint_states
  gz_topic_name: /world/enfield_world/model/ur5e/joint_state
  ros_type_name: sensor_msgs/msg/JointState
  gz_type_name: ignition.msgs.Model
  direction: GZ_TO_ROS
