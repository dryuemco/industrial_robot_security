# =============================================================================
# ENFIELD CI Pipeline
# Build → Test → SBOM → Vulnerability Scan
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ROS_DISTRO: humble

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: ROS2 workspace build + colcon tests
  # ---------------------------------------------------------------------------
  build-and-test:
    runs-on: ubuntu-22.04
    container:
      image: ros:humble
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y \
            python3-colcon-common-extensions \
            python3-pip \
            python3-pytest
          pip3 install --no-cache-dir -r requirements.txt

      - name: Build workspace
        run: |
          source /opt/ros/$ROS_DISTRO/setup.bash
          colcon build --symlink-install
        shell: bash

      - name: Run colcon tests
        run: |
          source /opt/ros/$ROS_DISTRO/setup.bash
          source install/setup.bash
          colcon test --return-code-on-test-failure
        shell: bash

      - name: Test results
        if: always()
        run: |
          source /opt/ros/$ROS_DISTRO/setup.bash
          colcon test-result --verbose
        shell: bash

  # ---------------------------------------------------------------------------
  # Job 2: Task IR schema validation tests (75+ tests)
  # ---------------------------------------------------------------------------
  test-task-ir:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install jsonschema pyyaml pytest

      - name: Run Task IR tests
        run: |
          cd $GITHUB_WORKSPACE
          PYTHONPATH=enfield_tasks python3 -m pytest \
            enfield_tasks/test/test_schema_validation.py -v \
            --tb=short

  # ---------------------------------------------------------------------------
  # Job 3: Attack variant generator tests (69+ tests)
  # ---------------------------------------------------------------------------
  test-attacks:
    runs-on: ubuntu-22.04
    needs: test-task-ir
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install jsonschema pyyaml pytest

      - name: Run attack variant tests
        run: |
          cd $GITHUB_WORKSPACE
          PYTHONPATH=enfield_attacks:enfield_tasks python3 -m pytest \
            enfield_attacks/test/test_variant_generator.py -v \
            --tb=short

  # ---------------------------------------------------------------------------
  # Job 4: IR → URScript translator tests (51 tests)
  # ---------------------------------------------------------------------------
  test-translators:
    runs-on: ubuntu-22.04
    needs: test-task-ir
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pytest

      - name: Run translator tests
        run: |
          cd $GITHUB_WORKSPACE
          PYTHONPATH=enfield_translators:enfield_tasks python3 -m pytest \
            enfield_translators/test/test_urscript_translator.py -v \
            --tb=short

  # ---------------------------------------------------------------------------
  # Job 5: Static watchdog tests (83 tests)
  # ---------------------------------------------------------------------------
  test-watchdog-static:
    runs-on: ubuntu-22.04
    needs: [test-task-ir, test-attacks]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pytest

      - name: Run static watchdog tests
        run: |
          cd $GITHUB_WORKSPACE
          PYTHONPATH=enfield_watchdog_static:enfield_tasks python3 -m pytest \
            enfield_watchdog_static/test/test_watchdog.py -v \
            --tb=short

  # ---------------------------------------------------------------------------
  # Job 6: Experiment runner tests (23 tests)
  # ---------------------------------------------------------------------------
  test-experiment-runner:
    runs-on: ubuntu-22.04
    needs: [test-task-ir, test-attacks, test-watchdog-static]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pytest

      - name: Run experiment runner tests
        run: |
          cd $GITHUB_WORKSPACE
          PYTHONPATH=enfield_watchdog_static:enfield_tasks python3 -m pytest \
            test/test_experiment_runner.py -v \
            --tb=short

  # ---------------------------------------------------------------------------
  # Job 7: Docker build
  # ---------------------------------------------------------------------------
  docker-build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --target builder -t enfield:ci .

  # ---------------------------------------------------------------------------
  # Job 8: SBOM generation + vulnerability scan
  # ---------------------------------------------------------------------------
  sbom-and-scan:
    runs-on: ubuntu-22.04
    needs: docker-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --target runtime -t enfield:scan .

      - name: Generate SBOM (CycloneDX)
        uses: CycloneDX/gh-python-generate-sbom@v2
        with:
          input: requirements.txt
          output: sbom.json
          format: json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: enfield:scan
          format: json
          output: trivy-report.json
          severity: CRITICAL,HIGH

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
